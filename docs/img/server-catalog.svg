<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Catalog of the 15 Check Point @chkp MCP servers this project hosts (of 18 upstream): management-shaped servers, product-specific servers, and quantum-gaia (interactive-only auth). Each runs as a stdio child of the agent with its own Azure Key Vault secret. 9 of 15 deploy by default; excluded from default are cloudguard-waf, spark-management, harmony-sase, workforce-ai, argos-erm, and quantum-gaia.">
  <defs>
    <linearGradient id="cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d95"/>
      <stop offset="1" stop-color="#a02bce"/>
    </linearGradient>
    <style>
      .p{fill:#1c2036} .m{fill:#565d78} .f{fill:#8489a0}
      .t{font-weight:700} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .chip{fill:#ffffff;stroke:#d9ddeb}
      .sans{font-family:-apple-system,'Segoe UI',sans-serif}
    </style>
  </defs>

  <rect x="1" y="1" width="1238" height="618" rx="18" fill="#ffffff" stroke="#e2e5f1" stroke-width="1.5"/>

  <!-- title -->
  <rect x="40" y="32" width="6" height="30" rx="3" fill="url(#cp)"/>
  <text x="58" y="47" class="p t" font-size="21">Server catalog</text>
  <text x="58" y="70" class="m" font-size="14">15 <tspan class="mono">@chkp</tspan> MCP servers hosted (of 18 upstream)  ·  stdio children of the agent  ·  every credentialed server gets its <tspan class="t" fill="#1c2036">own</tspan> Key Vault secret</text>

  <!-- ============ GROUP A: management-shaped ============ -->
  <rect x="40" y="104" width="384" height="470" rx="14" fill="#fdf4fa" stroke="url(#cp)" stroke-width="2"/>
  <text x="62" y="136" class="p t" font-size="14">Management-shaped</text>
  <rect x="266" y="120" width="138" height="22" rx="11" fill="url(#cp)"/>
  <text x="335" y="135" fill="#fff" class="t" font-size="10" text-anchor="middle">DEPLOYED BY DEFAULT</text>
  <text x="62" y="158" class="m" font-size="12">own Key Vault secret · <tspan class="mono">chkpmcp-&lt;server&gt;</tspan></text>

  <g class="mono">
    <rect x="62" y="176" width="340" height="44" rx="8" class="chip"/><text x="78" y="203" class="p" font-size="13">quantum-management</text>
    <rect x="62" y="228" width="340" height="44" rx="8" class="chip"/><text x="78" y="255" class="p" font-size="13">management-logs</text>
    <rect x="62" y="280" width="340" height="44" rx="8" class="chip"/><text x="78" y="307" class="p" font-size="13">threat-prevention</text>
    <rect x="62" y="332" width="340" height="44" rx="8" class="chip"/><text x="78" y="359" class="p" font-size="13">https-inspection</text>
    <rect x="62" y="384" width="340" height="44" rx="8" class="chip"/><text x="78" y="411" class="p" font-size="13">policy-insights</text>
    <rect x="62" y="436" width="340" height="52" rx="8" class="chip"/><text x="78" y="460" class="p" font-size="13">quantum-gw-cli</text>
    <text x="78" y="477" class="f sans" font-size="10">authenticates to the Management server (not Gaia)</text>
  </g>
  <text x="62" y="520" class="f sans" font-size="10.5">all six share the same credential fields, separate secrets</text>

  <!-- ============ GROUP B: product-specific ============ -->
  <rect x="440" y="104" width="384" height="470" rx="14" fill="#fffaf1" stroke="#e8952f" stroke-width="2"/>
  <text x="462" y="136" class="p t" font-size="14">Product-specific</text>
  <text x="462" y="158" class="m" font-size="12">own Key Vault secret · <tspan class="mono">chkpmcp-&lt;server&gt;</tspan></text>

  <g class="mono">
    <rect x="462" y="174" width="340" height="40" rx="8" class="chip"/><text x="478" y="199" class="p" font-size="13">reputation-service</text>
    <rect x="716" y="184" width="70" height="18" rx="9" fill="url(#cp)"/><text x="751" y="197" fill="#fff" class="t sans" font-size="9" text-anchor="middle">DEFAULT</text>
    <rect x="462" y="220" width="340" height="40" rx="8" class="chip"/><text x="478" y="245" class="p" font-size="13">threat-emulation</text>
    <rect x="716" y="230" width="70" height="18" rx="9" fill="url(#cp)"/><text x="751" y="243" fill="#fff" class="t sans" font-size="9" text-anchor="middle">DEFAULT</text>
    <rect x="462" y="266" width="340" height="40" rx="8" class="chip"/><text x="478" y="291" class="p" font-size="13">documentation</text>
    <rect x="716" y="276" width="70" height="18" rx="9" fill="url(#cp)"/><text x="751" y="289" fill="#fff" class="t sans" font-size="9" text-anchor="middle">DEFAULT</text>
    <rect x="462" y="312" width="340" height="40" rx="8" class="chip"/><text x="478" y="337" class="p" font-size="13">cloudguard-waf</text>
    <rect x="462" y="358" width="340" height="40" rx="8" class="chip"/><text x="478" y="383" class="p" font-size="13">argos-erm</text>
    <rect x="462" y="404" width="340" height="40" rx="8" class="chip"/><text x="478" y="429" class="p" font-size="13">spark-management</text>
    <rect x="462" y="450" width="340" height="40" rx="8" class="chip"/><text x="478" y="475" class="p" font-size="13">harmony-sase</text>
    <rect x="462" y="496" width="340" height="40" rx="8" class="chip"/><text x="478" y="521" class="p" font-size="13">workforce-ai</text>
  </g>
  <text x="462" y="556" class="f sans" font-size="10.5">the three DEFAULT ones ship by default; the rest need tenant creds</text>

  <!-- ============ GROUP C: interactive-only auth ============ -->
  <rect x="840" y="104" width="360" height="470" rx="14" fill="#fafbfe" stroke="#d4d8e6" stroke-width="2"/>
  <text x="862" y="136" class="p t" font-size="14">Interactive-only auth</text>
  <text x="862" y="158" class="m" font-size="12">agent-side secret · answered in the agent loop</text>

  <g class="mono">
    <rect x="862" y="176" width="316" height="64" rx="8" class="chip"/>
    <text x="878" y="202" class="p" font-size="13">quantum-gaia</text>
    <text x="878" y="223" class="f sans" font-size="10">agent-side secret · answers the login prompt</text>
  </g>
  <text x="862" y="290" class="f sans" font-size="11">The Gaia server authenticates via an interactive MCP</text>
  <text x="862" y="306" class="f sans" font-size="11">login prompt. Unlike the AWS gateway, <tspan class="t" fill="#565d78">stdio does</tspan></text>
  <text x="862" y="322" class="f sans" font-size="11"><tspan class="t" fill="#565d78">relay elicitation</tspan> — so it works here, answered</text>
  <text x="862" y="338" class="f sans" font-size="11">agent-side from the <tspan class="mono">chkpmcp-quantum-gaia</tspan></text>
  <text x="862" y="354" class="f sans" font-size="11">secret (or <tspan class="mono">GAIA_*</tspan> env vars).</text>
  <text x="862" y="378" class="f sans" font-size="11">Excluded from the default and from <tspan class="mono">--servers all</tspan>.</text>

  <!-- footer -->
  <text x="40" y="600" class="m" font-size="12.5"><tspan class="mono" fill="#1c2036">chkpmcpaz deploy</tspan> brings up 9 of 15 by default · <tspan class="mono" fill="#1c2036">--servers</tspan> adds any by name · set credentials with <tspan class="mono" fill="#1c2036">chkpmcpaz creds template</tspan> then <tspan class="mono" fill="#1c2036">apply</tspan></text>
</svg>
