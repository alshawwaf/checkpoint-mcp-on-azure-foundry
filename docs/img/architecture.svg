<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Check Point @chkp MCP servers run as stdio child processes of a Security-Ops agent on Microsoft Foundry — no gateway. Consumers reach the agent from the chkpmcpaz CLI, an app via the Responses endpoint, or Teams and n8n through a bearer-token Azure Function. The agent reasons on Claude on Foundry or a cheap first-party gpt-5-mini deployment, optionally screened by an inline AI guardrail (Content Safety Prompt Shields by default, or the opt-in Check Point AI Guardrail / Lakera), and calls the @chkp servers which reach the Check Point estate. Key Vault holds per-server credentials; the image comes from Azure Container Registry; traces go to App Insights.">
  <defs>
    <linearGradient id="cp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d95"/>
      <stop offset="1" stop-color="#a02bce"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b90a8"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e0117f"/>
    </marker>
    <style>
      .p{fill:#1c2036} .m{fill:#565d78} .f{fill:#8489a0}
      .t{font-weight:700} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .zone{fill:#f7f8fd;stroke:#e2e5f1}
      .node{fill:#ffffff;stroke:#d9ddeb}
      .dash{fill:#f7f8fd;stroke:#c9cede;stroke-dasharray:4 3}
      .agent{fill:#fdf4fa;stroke:url(#cp)}
      .edge{stroke:#8b90a8;stroke-width:2;fill:none}
      .edgeD{stroke:#9aa0b6;stroke-width:1.8;fill:none;stroke-dasharray:5 4}
      .edgeA{stroke:#e0117f;stroke-width:2.5;fill:none}
    </style>
  </defs>

  <rect x="1" y="1" width="1298" height="718" rx="18" fill="#ffffff" stroke="#e2e5f1" stroke-width="1.5"/>

  <!-- title -->
  <rect x="40" y="32" width="6" height="30" rx="3" fill="url(#cp)"/>
  <text x="58" y="47" class="p t" font-size="21">Check Point MCP on Microsoft Foundry</text>
  <text x="58" y="70" class="m" font-size="13.5">15 <tspan class="mono">@chkp</tspan> MCP servers  ·  stdio children of the agent (no gateway)  ·  Claude on Foundry or <tspan class="mono">gpt-5-mini</tspan></text>

  <!-- zone labels + Azure panel -->
  <text x="60"   y="118" class="f t" font-size="12" letter-spacing="1.5">CONSUMERS</text>
  <rect x="300" y="130" width="745" height="562" rx="14" class="zone"/>
  <text x="322"  y="118" class="f t" font-size="12" letter-spacing="1.5">AZURE  ·  MICROSOFT FOUNDRY  (eastus2 · swedencentral)</text>
  <text x="1075" y="118" class="f t" font-size="12" letter-spacing="1.5">CHECK POINT ESTATE</text>

  <!-- ============ consumers (aligned to the agent band → clean near-horizontal lines) ============ -->
  <rect x="40" y="296" width="235" height="92" rx="10" class="agent" stroke-width="2"/>
  <text x="58" y="322" class="p t" font-size="13.5">chkpmcpaz CLI</text>
  <text x="58" y="342" class="m" font-size="11.5">local agent, streams in your terminal</text>
  <text x="58" y="360" class="f" font-size="11">Entra ID · runs the loop in-process</text>
  <text x="58" y="378" class="f" font-size="11">or calls the hosted agent →</text>

  <rect x="40" y="406" width="235" height="66" rx="10" class="node"/>
  <text x="58" y="432" class="p t" font-size="13">Your app / SDK</text>
  <text x="58" y="452" class="f" font-size="11">OpenAI Responses client · Entra bearer</text>

  <rect x="40" y="492" width="235" height="66" rx="10" class="node"/>
  <text x="58" y="518" class="p t" font-size="13">Teams · n8n · curl</text>
  <text x="58" y="538" class="f" font-size="11">bearer token over HTTPS → bridge</text>

  <!-- ============ Foundry account: models (top row) ============ -->
  <text x="330" y="152" class="f" font-size="11">FOUNDRY ACCOUNT · <tspan class="mono">chkpmcp-foundry-{token}</tspan></text>

  <rect x="330" y="160" width="250" height="104" rx="11" class="node"/>
  <text x="348" y="186" class="p t" font-size="13.5">Claude deployments</text>
  <text x="348" y="208" class="p mono" font-size="11.5">claude-sonnet-4-6</text><text x="470" y="208" class="f" font-size="10.5">primary</text>
  <text x="348" y="227" class="p mono" font-size="11.5">claude-haiku-4-5</text><text x="470" y="227" class="f" font-size="10.5">fallback</text>
  <text x="348" y="250" class="f" font-size="10.5"><tspan class="mono">/anthropic</tspan> · AnthropicFoundry · Entra</text>

  <rect x="598" y="160" width="205" height="104" rx="11" class="dash"/>
  <text x="616" y="186" class="p t" font-size="12.5">gpt-5-mini · cheap test</text>
  <text x="616" y="207" class="f" font-size="10.5">first-party Azure OpenAI</text>
  <text x="616" y="225" class="f" font-size="10.5"><tspan class="mono">/openai</tspan> · provider seam</text>
  <text x="616" y="243" class="f" font-size="10.5">the Azure analog of AWS Nova</text>

  <rect x="820" y="160" width="203" height="104" rx="11" class="node"/>
  <text x="838" y="186" class="p t" font-size="12.5">AI Guardrail</text>
  <text x="838" y="207" class="m" font-size="11">Prompt Shields · default</text>
  <text x="838" y="227" class="f" font-size="10.5">or Check Point · Lakera</text>
  <text x="838" y="245" class="f" font-size="10.5">pre-model screen · optional</text>

  <!-- ============ the agent (hub) ============ -->
  <rect x="330" y="332" width="268" height="138" rx="13" class="agent" stroke-width="2.5"/>
  <path d="M330 366 V346 q0-14 14-14 h240 q14 0 14 14 v20 z" fill="url(#cp)"/>
  <text x="348" y="354" fill="#fff" font-size="11.5" class="t">MICROSOFT FOUNDRY · HOSTED AGENT</text>
  <text x="348" y="390" class="p t" font-size="15">Security-Ops Agent</text>
  <text x="348" y="411" class="m" font-size="11.5">hosted · <tspan class="mono" font-size="11">chkpmcp-agent</tspan></text>
  <text x="348" y="428" class="m" font-size="10.5">Responses 2.0.0 · provider-agnostic loop</text>
  <text x="348" y="445" class="f" font-size="10.5">Claude or <tspan class="mono">gpt-5-mini</tspan> · prompt caching</text>
  <text x="348" y="461" class="f" font-size="10.5">token telemetry · also runs <tspan class="mono">local</tspan></text>

  <!-- bridge -->
  <rect x="330" y="490" width="268" height="56" rx="10" class="node"/>
  <text x="348" y="514" class="p t" font-size="12.5">bridge · Azure Function</text>
  <text x="348" y="532" class="f" font-size="10">bearer token over HTTPS · clean JSON out</text>

  <!-- ============ @chkp servers group (right of agent) ============ -->
  <rect x="614" y="312" width="228" height="262" rx="12" fill="#fcfcff" stroke="#e6e9f4"/>
  <text x="630" y="330" class="f" font-size="10.5"><tspan class="mono">@chkp</tspan> MCP servers · stdio · 9 default</text>
  <g class="mono" font-size="11.5">
    <rect x="628" y="332" width="200" height="40" rx="8" class="node"/>
    <text x="644" y="357" class="p">quantum-management</text>
    <rect x="628" y="380" width="200" height="40" rx="8" class="node"/>
    <text x="644" y="405" class="p">threat-prevention</text>
    <rect x="628" y="428" width="200" height="40" rx="8" class="node"/>
    <text x="644" y="453" class="p">management-logs</text>
    <rect x="628" y="476" width="200" height="40" rx="8" class="node"/>
    <text x="644" y="501" class="p">documentation</text>
    <rect x="628" y="524" width="200" height="40" rx="8" class="dash"/>
    <text x="644" y="549" class="m" font-size="11">+ 5 more · 15 total</text>
  </g>

  <!-- ============ infra (bottom row) ============ -->
  <rect x="330" y="590" width="200" height="86" rx="10" class="node"/>
  <text x="348" y="614" class="p t" font-size="12">Azure Key Vault</text>
  <text x="348" y="633" class="f mono" font-size="10">kv-chkpmcp-{token}</text>
  <text x="348" y="651" class="f" font-size="10">one secret per server</text>
  <text x="348" y="668" class="f" font-size="10">secret JSON → child env at spawn</text>

  <rect x="550" y="590" width="190" height="86" rx="10" class="node"/>
  <text x="568" y="614" class="p t" font-size="12">Container Registry</text>
  <text x="568" y="633" class="f mono" font-size="10">chkp-agent:v1</text>
  <text x="568" y="651" class="f" font-size="10"><tspan class="mono">az acr build</tspan> · remote</text>
  <text x="568" y="668" class="f" font-size="10">digest-pinned image</text>

  <rect x="760" y="590" width="263" height="86" rx="10" class="node"/>
  <text x="778" y="614" class="p t" font-size="12">Log Analytics + Application Insights</text>
  <text x="778" y="633" class="f mono" font-size="10">log-/appi-chkpmcp-{token}</text>
  <text x="778" y="651" class="f" font-size="10">OpenTelemetry traces · logs · KQL</text>
  <text x="778" y="668" class="f" font-size="10">from the hosted agent</text>

  <!-- ============ Check Point estate (aligned to the servers band → level pipeline line) ============ -->
  <rect x="1075" y="338" width="185" height="200" rx="12" class="node"/>
  <text x="1097" y="374" class="p t" font-size="15">Check Point estate</text>
  <text x="1097" y="406" class="m" font-size="12.5">Management server</text>
  <text x="1097" y="428" class="m" font-size="12.5">Smart-1 Cloud</text>
  <text x="1097" y="450" class="m" font-size="12.5">Gateways</text>
  <text x="1097" y="488" class="f" font-size="11.5">your real security data</text>

  <!-- ==================== edges (each in its own clear lane) ==================== -->
  <!-- CLI -> agent (hosted call) : gentle drop onto the body, clear of the tab -->
  <path d="M275 344 C 297 366, 314 390, 330 404" class="edgeA" marker-end="url(#am)"/>
  <!-- app/SDK -> agent : near-horizontal, no crossing -->
  <path d="M275 439 C 297 439, 314 440, 330 440" class="edge" marker-end="url(#a)"/>
  <!-- teams -> bridge : near-horizontal -->
  <path d="M275 525 C 297 522, 314 518, 330 516" class="edge" marker-end="url(#a)"/>
  <!-- bridge -> agent -->
  <path d="M464 490 L464 472" class="edge" marker-end="url(#a)"/>

  <!-- agent -> Claude (model call) -->
  <path d="M452 332 C 452 306, 454 286, 455 266" class="edgeA" marker-end="url(#am)"/>
  <text x="462" y="300" class="p" font-size="9.5">AnthropicFoundry</text>
  <!-- Claude .. gpt-5-mini : alternatives -->
  <path d="M582 210 L596 210" class="edgeD" marker-end="url(#a)" marker-start="url(#a)"/>
  <text x="589" y="200" class="f" font-size="9.5" text-anchor="middle">or</text>

  <!-- agent -> Content Safety (optional guardrail) : orthogonal via the clear y300 lane -->
  <path d="M560 332 V 302 H 905 V 266" class="edgeD" marker-end="url(#a)"/>
  <text x="732" y="296" class="f" font-size="9.5" text-anchor="middle">screen · optional</text>

  <!-- agent -> servers group (spawns stdio children) -->
  <path d="M598 438 L614 438" class="edge" marker-end="url(#a)"/>

  <!-- servers group -> estate : level pipeline line -->
  <path d="M842 438 C 940 438, 1010 438, 1075 438" class="edge" marker-end="url(#a)"/>
  <text x="958" y="428" class="f" font-size="10" text-anchor="middle">Mgmt API / HTTPS</text>

  <!-- Key Vault -> servers group (secret at spawn) : orthogonal via the clear y582 lane -->
  <path d="M470 590 V 582 H 720 V 574" class="edgeD" marker-end="url(#a)"/>
  <text x="576" y="577" class="f" font-size="9.5" text-anchor="middle">secret → child env</text>
</svg>
